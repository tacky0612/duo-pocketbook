    web.transferDTO:
      description: DirectTransfer は立替精算の純額のみの振込。0円なら null。
      properties:
        amountYen:
          example: 25000
          type: integer
        from:
          example: acct_9f3c1a2b7d4e5f60
          type: string
        to:
          example: acct_1a2b3c4d5e6f7a8b
          type: string
      type: object
    web.updateLoginIDRequest:
      properties:
        loginId:
          example: taro2
          type: string
      type: object
    web.updateMemberRequest:
      properties:
        color:
          example: '#FF8800'
          type: string
        name:
          example: 太郎
          type: string
      type: object
    web.updatePasswordRequest:
      properties:
        currentPassword:
          example: taro-password
          type: string
        newPassword:
          example: new-password-8+
          type: string
      type: object
    web.weightsDTO:
      properties:
