openapi: "3.0.3"
info:
  title: duo-pocketbook API
  description: |
    クライアント2人で使う家計簿アプリケーションのAPI。

    共有支出を2アカウントから登録し、月次で双方の収入を入力すると、
    指定した比重で双方の可処分所得が揃うよう精算額（振込額）を算出します。

    精算ロジック: 各メンバーの純額 net = 収入 - 立替済み共有支出 とし、
    比重 wA:wB に対して A→B の振込額 t = (wB*netA - wA*netB) / (wA + wB) を
    計算します（端数は四捨五入、負の場合はB→Aの振込）。
    精算後は 可処分所得A/wA == 可処分所得B/wB が成り立ちます。

    アクセス制限（任意）: バックエンドに CLIENT_KEY を設定して運用する場合、
    `/health` と CORS プリフライトを除く全リクエストに `X-Client-Key` ヘッダ
    （事前共有キー）が必要です。不一致は 403 (FORBIDDEN)。また `/login` は
    IP単位のレート制限があり、超過時は 429 (RATE_LIMITED) を返します。
  version: "1.0.0"
servers:
  - url: http://localhost:8080
    description: ローカル環境 (Docker Compose)
  - url: "{functionUrl}"
    description: AWS Lambda Function URL
    variables:
      functionUrl:
        default: https://example.lambda-url.ap-northeast-1.on.aws
security:
  - bearerAuth: []
paths:
  /health:
    get:
      summary: ヘルスチェック
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /login:
    post:
      summary: ログイン（JWT発行）
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberId, password]
              properties:
                memberId:
                  type: string
                  example: taro
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: 認証成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  member:
                    $ref: "#/components/schemas/Member"
                  expiresAt:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"
  /members:
    get:
      summary: メンバー一覧
      description: 表示名・カラーの上書き設定（`PUT /members/{id}`）を反映した値を返す。
      responses:
        "200":
          description: 2人のメンバー
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/Member"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /members/{id}:
    put:
      summary: メンバーの表示名・カラーを更新
      description: 指定した項目（`name`/`color`）のみを上書きする。省略した項目は変更しない。
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                color:
                  type: string
                  description: "\"#RRGGBB\" 形式"
                  example: "#FF8800"
      responses:
        "200":
          description: 更新後のメンバー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /account:
    get:
      summary: 認証中アカウントの情報（不変のAccountID・可変のログインID・表示名）
      responses:
        "200":
          description: アカウント情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /account/login-id:
    put:
      summary: ログインIDの変更
      description: ログイン用の可変ユーザー名を変更する。AccountID は不変で変わらない。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginId]
              properties:
                loginId:
                  type: string
                  description: 英数字と . _ - のみ・32文字以内。2アカウントで重複不可
      responses:
        "200":
          description: 変更後のアカウント情報
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /account/password:
    put:
      summary: パスワードの変更
      description: 現在のパスワードを検証したうえで新しいパスワードに更新する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
                  description: 8文字以上
      responses:
        "204":
          description: 変更成功
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /expenses:
    post:
      summary: 共有支出の登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paidBy, amountYen, date]
              properties:
                paidBy:
                  type: string
                  description: 立て替えたメンバーのID
                amountYen:
                  type: integer
                  format: int64
                  minimum: 1
                  description: 金額（円）
                description:
                  type: string
                date:
                  type: string
                  format: date
                  example: "2026-07-15"
      responses:
        "201":
          description: 登録された支出
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: 共有支出の月別一覧（日付降順）
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
            example: "2026-07"
      responses:
        "200":
          description: 支出一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                  expenses:
                    type: array
                    items:
                      $ref: "#/components/schemas/Expense"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /expenses/{id}:
    put:
      summary: 共有支出の更新
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paidBy, amountYen, date]
              properties:
                paidBy:
                  type: string
                amountYen:
                  type: integer
                  format: int64
                  minimum: 1
                description:
                  type: string
                date:
                  type: string
                  format: date
      responses:
        "200":
          description: 更新後の支出
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: 共有支出の削除
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /months/{month}/incomes/{memberId}:
    put:
      summary: 月次収入の入力（上書き）
      parameters:
        - $ref: "#/components/parameters/Month"
        - name: memberId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountYen]
              properties:
                amountYen:
                  type: integer
                  format: int64
                  minimum: 0
      responses:
        "200":
          description: 保存された収入
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                  income:
                    $ref: "#/components/schemas/Income"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /months/{month}/incomes:
    get:
      summary: 月次収入の一覧
      parameters:
        - $ref: "#/components/parameters/Month"
      responses:
        "200":
          description: 入力済み収入
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                  incomes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Income"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /months/{month}/settlement:
    get:
      summary: 月次精算の取得
      description: |
        両メンバーの収入が入力済みの場合に精算結果を返します。
        未入力の場合は 409 (INCOME_NOT_READY) を返します。
      parameters:
        - $ref: "#/components/parameters/Month"
      responses:
        "200":
          description: 精算結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settlement"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: 収入が未入力
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /months/{month}/settlement/status:
    put:
      summary: 精算済みフラグの更新
      parameters:
        - $ref: "#/components/parameters/Month"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [settled]
              properties:
                settled:
                  type: boolean
      responses:
        "200":
          description: 更新後のフラグ
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                  settled:
                    type: boolean
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /settlements/history:
    get:
      summary: 精算履歴の取得
      description: 指定した年月の範囲（両端含む）の精算結果を新しい月順に返す。
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
            example: "2026-01"
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
            example: "2026-07"
      responses:
        "200":
          description: 精算履歴
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        month:
                          type: string
                        settled:
                          type: boolean
                        totalExpenseYen:
                          type: integer
                          format: int64
                        transfer:
                          type: object
                          nullable: true
                          properties:
                            from:
                              type: string
                            to:
                              type: string
                            amountYen:
                              type: integer
                              format: int64
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /recurring-expenses:
    post:
      summary: 固定費の登録
      description: 特定の月に紐づかず、精算時に対象月の共有支出として実体化される。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringExpenseInput"
      responses:
        "201":
          description: 登録された固定費
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringExpense"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      summary: 固定費の一覧
      responses:
        "200":
          description: 固定費一覧
          content:
            application/json:
              schema:
                type: object
                properties:
                  recurringExpenses:
                    type: array
                    items:
                      $ref: "#/components/schemas/RecurringExpense"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /recurring-expenses/{id}:
    put:
      summary: 固定費の更新
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecurringExpenseInput"
      responses:
        "200":
          description: 更新後の固定費
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringExpense"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: 固定費の削除
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: 削除成功
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /settings/weight:
    get:
      summary: 精算比重の取得
      responses:
        "200":
          description: 現在の比重（未設定時は1:1）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Weights"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: 精算比重の更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Weights"
      responses:
        "200":
          description: 更新後の比重
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Weights"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    # 任意の事前共有キー（CLIENT_KEY 設定時のみ有効）。全リクエストに付与する。
    clientKey:
      type: apiKey
      in: header
      name: X-Client-Key
  parameters:
    Month:
      name: month
      in: path
      required: true
      schema:
        type: string
        pattern: "^\\d{4}-\\d{2}$"
        example: "2026-07"
  schemas:
    Member:
      type: object
      properties:
        id:
          type: string
          example: taro
        name:
          type: string
          example: 太郎
        color:
          type: string
          description: "\"#RRGGBB\" 形式。上書き未設定の場合は省略される。"
          example: "#FF8800"
    Account:
      type: object
      description: 認証中アカウント。accountId はアカウント作成時から不変、loginId はログイン用の可変ユーザー名。
      properties:
        accountId:
          type: string
          description: アカウントを一意に定める不変ID。JWT の subject。
          example: acct_9f3c1a2b7d4e5f60
        loginId:
          type: string
          description: ログインに用いる可変のユーザー名。
          example: taro
        name:
          type: string
          example: 太郎
    Expense:
      type: object
      properties:
        id:
          type: string
          example: 2026-07_a1b2c3d4e5f6a7b8a1b2c3d4e5f6a7b8
        paidBy:
          type: string
        amountYen:
          type: integer
          format: int64
        description:
          type: string
        date:
          type: string
          format: date
        month:
          type: string
          example: "2026-07"
        createdAt:
          type: string
          format: date-time
    Income:
      type: object
      properties:
        memberId:
          type: string
        amountYen:
          type: integer
          format: int64
    RecurringExpenseInput:
      type: object
      required: [paidBy, amountYen, description]
      properties:
        paidBy:
          type: string
          description: 毎月立て替えるメンバーのID
        amountYen:
          type: integer
          format: int64
          minimum: 1
        description:
          type: string
    RecurringExpense:
      type: object
      properties:
        id:
          type: string
        paidBy:
          type: string
        amountYen:
          type: integer
          format: int64
        description:
          type: string
    Weights:
      type: object
      properties:
        weights:
          type: object
          additionalProperties:
            type: integer
            format: int64
            minimum: 1
          example:
            taro: 1
            hanako: 1
    Settlement:
      type: object
      properties:
        month:
          type: string
          example: "2026-07"
        totalExpenseYen:
          type: integer
          format: int64
        settled:
          type: boolean
          description: 精算済みフラグ（`PUT /months/{month}/settlement/status` で更新）
        members:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              weight:
                type: integer
                format: int64
              incomeYen:
                type: integer
                format: int64
              paidExpenseYen:
                type: integer
                format: int64
              disposableYen:
                type: integer
                format: int64
                description: 精算後の可処分所得
        transfer:
          type: object
          nullable: true
          description: 精算に必要な振込。精算不要の場合は null。
          properties:
            from:
              type: string
            to:
              type: string
            amountYen:
              type: integer
              format: int64
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - INCOME_NOT_READY
                - RATE_LIMITED
                - INTERNAL
            message:
              type: string
  responses:
    ValidationError:
      description: 入力値が不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: 認証エラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: 対象が存在しない
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
