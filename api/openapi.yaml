          additionalProperties:
            type: integer
          type: object
      type: object
  securitySchemes:
    BearerAuth:
      description: 'JWT を `Authorization: Bearer <token>` 形式で送る。'
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: |-
    クライアント2人で使う家計簿アプリケーションのAPI。
    共有支出を2アカウントから登録し、月次で双方の収入を入力すると、指定した比重で双方の可処分所得が揃うよう精算額（振込額）を算出します。
    精算ロジック: 各メンバーの純額 net = 収入 - 立替済み共有支出 とし、比重 wA:wB に対して A→B の振込額 t = (wB*netA - wA*netB) / (wA + wB) を計算します（端数は四捨五入、負の場合はB→Aの振込）。精算後は 可処分所得A/wA == 可処分所得B/wB が成り立ちます。
    認証: `POST /login` で JWT を取得し、以降は `Authorization: Bearer <token>` を付与します（memberId にはログインIDを渡す。JWT の subject は不変の AccountID）。
    アクセス制限（任意）: バックエンドに CLIENT_KEY を設定して運用する場合、`/health` と CORS プリフライトを除く全リクエストに事前共有キー `X-Client-Key` ヘッダが必要です（不一致は 403 FORBIDDEN）。また `/login` は IP 単位のレート制限があり、超過時は 429 を返します。
    サーバー: ローカルは http://localhost:8080、本番は AWS Lambda Function URL。
  title: duo-pocketbook API
  version: 1.0.0
openapi: 3.1.0
paths:
  /account:
    get:
      description: 不変の AccountID・可変のログインID・表示名を返す。
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.accountDTO'
          description: OK
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: 認証中アカウントの情報
      tags:
      - account
  /account/login-id:
    put:
      description: ログイン用の可変ユーザー名を変更する。AccountID は不変で変わらない。英数字と . _ - のみ・32文字以内・2アカウントで重複不可。
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/web.updateLoginIDRequest'
                description: 新しいログインID
                summary: body
        description: 新しいログインID
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.accountDTO'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: ログインIDの変更
      tags:
      - account
  /account/password:
    put:
      description: 現在のパスワードを検証したうえで新しいパスワード（8文字以上）に更新する。
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/web.updatePasswordRequest'
                description: 現在と新しいパスワード
                summary: body
        description: 現在と新しいパスワード
        required: true
      responses:
        "204":
          description: 変更成功
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: 現在のパスワード不一致・新パスワードが要件未満
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: パスワードの変更
      tags:
      - account
  /direct-transfers:
    get:
      description: 指定精算月に適用される立替精算（毎月継続分＋当月単発分）を返す。
      parameters:
      - description: 対象月（YYYY-MM）
        in: query
        name: month
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.directTransfersResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: 立替精算の一覧
      tags:
      - direct-transfers
    post:
      description: 共有支出とは別に、送金元から他方へ渡す金額を登録する。比重按分に含めず、振込額へそのまま加算される。month が空なら毎月継続、指定するとその精算月のみの単発。
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/web.registerDirectTransferRequest'
                description: 立替精算
                summary: body
        description: 立替精算
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.directTransferDTO'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: 立替精算の登録
      tags:
      - direct-transfers
  /direct-transfers/{id}:
    delete:
      parameters:
      - description: 立替精算ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: 削除成功
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Not Found
      security:
      - BearerAuth: []
      summary: 立替精算の削除
      tags:
      - direct-transfers
    put:
      description: 送金元・金額・内容を更新する。継続/単発の別と対象月は変更できない（変更するには削除して再登録する）。
      parameters:
      - description: 立替精算ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/web.registerDirectTransferRequest'
                description: 立替精算
                summary: body
        description: 立替精算
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.directTransferDTO'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Not Found
      security:
      - BearerAuth: []
      summary: 立替精算の更新
      tags:
      - direct-transfers
  /expenses:
    get:
      description: 日付降順で返す。
      parameters:
      - description: 対象月（YYYY-MM）
        in: query
        name: month
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.expensesResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: 共有支出の月別一覧
      tags:
      - expenses
    post:
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/web.registerExpenseRequest'
                description: 支出
                summary: body
        description: 支出
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.expenseDTO'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: 共有支出の登録
      tags:
      - expenses
  /expenses/{id}:
    delete:
      parameters:
      - description: 支出ID
        in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        "204":
          description: 削除成功
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Not Found
      security:
      - BearerAuth: []
      summary: 共有支出の削除
      tags:
      - expenses
    put:
      parameters:
      - description: 支出ID
        in: path
        name: id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/web.registerExpenseRequest'
                description: 支出
                summary: body
        description: 支出
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.expenseDTO'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Not Found
      security:
      - BearerAuth: []
      summary: 共有支出の更新
      tags:
      - expenses
  /health:
    get:
      description: 認証・クライアントキー検証の対象外。
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.healthResponse'
          description: OK
      summary: ヘルスチェック
      tags:
      - system
  /incomes:
    get:
      description: 指定精算月に適用される追加収入（毎月継続分＋当月単発分）を返す。
      parameters:
      - description: 対象月（YYYY-MM）
        in: query
        name: month
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.incomesResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Bad Request
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/web.errorResponse'
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: 追加収入の一覧
      tags:
      - incomes
    post:
      description: 給与とは別の収入（副業など）を登録する。給与と合算して精算に反映される。month が空なら毎月継続、指定するとその精算月のみの単発。日付は持たない。
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/web.registerIncomeRequest'
                description: 追加収入
                summary: body
        description: 追加収入
        required: true
      responses:
